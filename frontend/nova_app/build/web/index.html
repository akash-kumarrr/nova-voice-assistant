<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nova — AI Voice Assistant">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nova">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080C14">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova — Voice Assistant</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #080C14; overflow: hidden; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #080C14;
      color: #8B5CF6;
      font-family: sans-serif;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #1E2535;
      border-top-color: #7C3AED;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span style="font-size:13px;color:#3D4A5C;letter-spacing:2px">NOVA</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
